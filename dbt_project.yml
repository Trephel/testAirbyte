name: 'avito_data_pipeline'
version: '1.0.0'
config-version: 2

profile: 'avito_snowflake'

model-paths: ["models"]
analysis-paths: ["analyses"] 
test-paths: ["tests"]
seed-paths: ["seeds"]
macro-paths: ["macros"]

require-dbt-version: ">=1.9.0,<2.0.0"  

models:
  avito_data_pipeline:
    # Configuration pour les modèles de staging
    staging:
      avito:
        +materialized: view
        +schema: "staging"
        +tags: ["staging", "avito"]
    
    # Configuration pour les modèles intermédiaires
    intermediate:
      +materialized: table
      +schema: "intermediate"
      +tags: ["intermediate"]
    
    # Configuration pour les modèles business (marts)
    marts:
      core:
        +materialized: table
        +schema: "analytics"
        +tags: ["marts", "core", "reporting"]

# Variables globales pour le projet
vars:
  project_name: "avito_cars_analysis"
  default_schema: "analytics"
  
  # Variables pour les seuils de qualité des données
  data_quality:
    min_car_year: 1990
    max_car_year: 2024
    max_mileage_km: 500000
    max_price_dh: 2000000

# Configuration des macros
query-comment: "dbt_avito_pipeline: {{ project_name }} v{{ version }}"